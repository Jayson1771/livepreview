# /etc/nginx/sites-available/livepreview
# Requires wildcard SSL cert: certbot certonly --dns-cloudflare -d *.preview.yourdomain.com

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name *.preview.yourdomain.com preview.yourdomain.com;
    return 301 https://$host$request_uri;
}

# Tunnel subdomains — proxy all *.preview.yourdomain.com to Node server
server {
    listen 443 ssl;
    server_name *.preview.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/preview.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/preview.yourdomain.com/privkey.pem;

    # Proxy tunnel traffic to Node.js
    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}

# Dashboard + API on the root domain
server {
    listen 443 ssl;
    server_name preview.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/preview.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/preview.yourdomain.com/privkey.pem;

    # API routes
    location /api/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      "upgrade";
    }

    # WebSocket tunnel connections
    location /ws/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # React dashboard (built static files)
    location / {
        root  /var/www/livepreview/dashboard/dist;
        try_files $uri $uri/ /index.html;
    }
}